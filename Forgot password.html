<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forgot password.css">
    <script src="https://kit.fontawesome.com/97ebdf5864.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container forgot">
        <h2>Reset Password</h2>

        <p class="info" id="infoText">Enter your new password below to reset it.</p>

        <form id="resetForm">

            <div class="form-group" id="passwordGroup">
                <input type="password" id="newPassword" required minlength="6">
                <label for="newPassword">New Password</label>
                <i class="fa-solid fa-lock"></i>
            </div>

            <input id="btn" type="submit" value="Reset Password">

            <p>Remembered your password? <a href="index.html">Login</a></p>

        </form>

        <div id="successMsg" class="success-msg" style="display:none;">
            <div class="check-icon">&#10003;</div>
            <p>Your password has been reset successfully.</p>
            <a href="index.html" id="successBtn">Back to Login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const container = document.querySelector('.container.forgot');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            // Front-end only demo: swap the form out for a success state.
            // Hook this up to your real password-reset endpoint here.
            form.style.display = 'none';
            document.getElementById('infoText').style.display = 'none';
            successMsg.style.display = 'flex';
        });
    </script>

</body>
</html>
