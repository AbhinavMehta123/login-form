<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forgot password.css">
    <script src="https://kit.fontawesome.com/97ebdf5864.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container forgot">
        <h2>Reset Password</h2>

        <p class="info" id="infoText">Enter your new password below to reset it.</p>

        <form id="resetForm">

            <div class="form-group" id="emailGroup">
                <input type="email" id="resetEmailInput" required>
                <label for="resetEmailInput">Email</label>
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="form-group" id="passwordGroup">
                <input type="password" id="newPassword" required minlength="6">
                <label for="newPassword">New Password</label>
                <i class="fa-solid fa-lock"></i>
            </div>

            <input id="btn" type="submit" value="Reset Password">

            <p>Remembered your password? <a href="index.html">Login</a></p>

        </form>

        <div id="successMsg" class="success-msg" style="display:none;">
            <div class="check-icon">&#10003;</div>
            <p>Your password has been reset successfully.</p>
            <a href="index.html" id="successBtn">Back to Login</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // Point this at wherever your backend actually runs
            const API_BASE = 'https://login-form-server.onrender.com/api/auth';

            const form = document.getElementById('resetForm');
            const infoText = document.getElementById('infoText');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = document.getElementById('btn');
            const newPasswordInput = document.getElementById('newPassword');
            const emailInput = document.getElementById('resetEmailInput');

            if (!form) {
                console.error('resetForm not found — check the HTML ids.');
                return;
            }

            // Email now comes from the field on this page. If the login page
            // saved one earlier (via "Forgot Password?"), use it to pre-fill
            // the field so returning users don't have to retype it.
            const savedEmail = sessionStorage.getItem('resetEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
            }

            // No error markup exists in this file, so a small banner is
            // created here at runtime instead of editing the HTML itself.
            const errorBanner = document.createElement('div');
            errorBanner.style.cssText =
                'width:100%;display:none;color:#fff;background:rgba(220,38,38,.9);' +
                'border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:10px;' +
                'font-size:14px;font-weight:600;text-align:center;margin-bottom:10px;';
            form.parentNode.insertBefore(errorBanner, form);

            let errorTimeout;

            function showError(message) {
                errorBanner.textContent = message;
                errorBanner.style.display = 'block';

                clearTimeout(errorTimeout);
                errorTimeout = setTimeout(clearError, 2000);
            }

            function clearError() {
                errorBanner.textContent = '';
                errorBanner.style.display = 'none';
            }

            form.addEventListener('submit', function (e) {
                // This must always run first, no matter what happens later,
                // so a normal page reload can never slip through.
                e.preventDefault();

                clearError();

                const email = emailInput.value.trim();

                if (!email) {
                    showError('Please enter your email address.');
                    return;
                }

                submitBtn.disabled = true;

                fetch(`${API_BASE}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        newPassword: newPasswordInput.value
                    })
                })
                    .then(async function (response) {
                        const data = await response.json();

                        if (!response.ok) {
                            const message = data.errors
                                ? Object.values(data.errors).join(' ')
                                : 'Something went wrong. Please try again.';
                            showError(message);
                            return;
                        }

                        sessionStorage.removeItem('resetEmail');
                        form.style.display = 'none';
                        infoText.style.display = 'none';
                        successMsg.style.display = 'flex';
                    })
                    .catch(function (err) {
                        console.error('Reset password request failed:', err);
                        showError('Unable to reach the server. Is the backend running?');
                    })
                    .finally(function () {
                        submitBtn.disabled = false;
                    });

                return false;
            });

        });
    </script>

</body>
</html>
